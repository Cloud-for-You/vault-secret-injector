---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: 
    service:
      name: webhook-service
      namespace: system
      path: /validate-k8s-io-v1-namespace
  failurePolicy: Fail
  name: vnamespace-v1.kb.io
  rules:
  - apiGroups:
    - k8s.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - namespaces
  sideEffects: None
