---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - serviceaccounts/token
  verbs:
  - create
  - get
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vaultsecret.cfy.cz
  resources:
  - keyvaults
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vaultsecret.cfy.cz
  resources:
  - keyvaults/finalizers
  verbs:
  - update
- apiGroups:
  - vaultsecret.cfy.cz
  resources:
  - keyvaults/status
  verbs:
  - get
  - patch
  - update
