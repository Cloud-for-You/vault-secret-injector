name: Integration Test

on:
  workflow_dispatch:
  pull_request:

jobs:
  integration-testing:
    name: Setup Kind Cluster and deploy Hashicorp Vault
    runs-on: ubuntu-latest
    steps:
      - name: Check available ports
        run: |
          if lsof -i :80 > /dev/null 2>&1 || lsof -i :443 > /dev/null 2>&1; then
            echo "Warning: Port 80 or 443 may be in use"
          fi

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: kind-cluster
          node_image: kindest/node:v1.28.0

      - name: Verify Kind cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repository 
        run: |
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update
      
      - name: Install Hashicorp Vault
        run: |
          helm install vault hashicorp/vault \
            --namespace hscp-vault \
            --create-namespace \
            --set server.dev.enabled=true \
            --set server.dev.devRootToken=test \
            --set injector.enabled=false

      - name: Wait and verify install Hashicorp Vault
        run: |
          # Wait for all pods in hscp-vault namespace to be ready
          kubectl -n hscp-vault wait --for=condition=Ready pods --all --timeout=300s
          
          # Verify all pods are running and ready
          echo "Checking pod status..."
          kubectl -n hscp-vault get pods -o wide
          
          # Get statefulset status and verify replica count
          echo "Checking statefulset status..."
          kubectl -n hscp-vault get statefulset
          
          # Additional verification - check that all replicas are available
          REPLICAS=$(kubectl -n hscp-vault get statefulset vault -o jsonpath='{.spec.replicas}')
          READY_REPLICAS=$(kubectl -n hscp-vault get statefulset vault -o jsonpath='{.status.readyReplicas}')
          echo "Expected replicas: $REPLICAS, Ready replicas: $READY_REPLICAS"
          if [ "$READY_REPLICAS" -lt "$REPLICAS" ]; then
            echo "ERROR: Not all replicas are ready"
            exit 1
          fi
          echo "Vault statefulset verified - all replicas are ready"

      - name: Install Vault-CLI 
        run: |
          wget -O - https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install vault

      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Hashicorp Vault policy
        run: |
          # Get Vault pod name
          VAULT_POD=$(kubectl -n hscp-vault get pods -l app.kubernetes.io/name=vault -o jsonpath='{.items[0].metadata.name}')
          echo "Vault pod: $VAULT_POD"
          
          # Copy policy file to Vault pod
          kubectl -n hscp-vault cp docs/policy.hcl $VAULT_POD:/tmp/policy.hcl
          
          # Write the policy to Vault using kubectl exec with VAULT_TOKEN
          kubectl -n hscp-vault exec $VAULT_POD -- env VAULT_TOKEN=test vault policy write vault-secret-injector-policy /tmp/policy.hcl
          
          # List policies to verify
          kubectl -n hscp-vault exec $VAULT_POD -- env VAULT_TOKEN=test vault policy list


