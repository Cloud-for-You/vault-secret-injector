name: Build application and create docker-container
on:
  workflow_call:
    inputs:
      PLATFORMS:
        description: 'Comma separated list of target for builds'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
    outputs:
      platforms:
        description: "Build platforms"
        value: ${{ jobs.build-docker-container.platforms }}
        

permissions:
  contents: read
#  pull-requests: write
#  issues: write


jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      project-name: ${{ steps.set-variables.outputs.project_name }}
      matrix-platforms: ${{ steps.set-variables.outputs.matrix_platforms }}
    steps:
      - name: Set new variables
        id: set-variables
        run: |
          echo "project_name=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "matrix_platforms=$(echo -n '${{ inputs.PLATFORMS }}' | jq -csR '. | split(",")')" >> $GITHUB_OUTPUT

  build-docker-container:
    runs-on: ubuntu-latest
    needs:
      - setup
    strategy:
      matrix:
        platform: ${{ fromJson(needs.setup.outputs.matrix-platforms) }}
    outputs:
      platforms: ${{ steps.set-platforms.outputs.platforms }}
    steps:
      - name: Set platform variables
        id: platform-vars
        run: |
          echo "platform_os=$(echo ${{ matrix.platform }} | cut -d '/' -f1)" >> $GITHUB_OUTPUT
          echo "platform_arch=$(echo ${{ matrix.platform }} | cut -d '/' -f2)" >> $GITHUB_OUTPUT
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ needs.setup.outputs.project-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=local,dest=/tmp/${{ needs.setup.outputs.project-name }}-container,mode=max
          push: false
          load: true
      - name: Upload cache artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.setup.outputs.project-name }}-${{ steps.platform-vars.outputs.platform_os }}-${{ steps.platform-vars.outputs.platform_arch }}-container
          path: /tmp/${{ needs.setup.outputs.project-name }}-container
          if-no-files-found: error
          retention-days: 1
      - name: Set platforms output
        id: set-platforms
        run: |
          echo "platforms=${{ needs.setup.outputs.matrix-platforms }}" >> $GITHUB_OUTPUT
  
  quality-code:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build-docker-container
    permissions:
      security-events: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Download cache artifact
        uses: actions/download-artifact@v8
        with:
          pattern: '*-container'
          path: /tmp/${{ needs.setup.outputs.project-name }}-container
      - name: Load docker images
        run: |
          find /tmp -type f
          for dir in /tmp/${{ needs.setup.outputs.project-name }}-container/*/; do
            docker buildx load --input "$dir"
          done
          docker images
      - name: Vulnerability scan in table
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ needs.setup.outputs.project-name }}:${{ github.sha }}
          format: "table"
      - name: SARIF generator
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ needs.setup.outputs.project-name }}:${{ github.sha }}
          format: "sarif"
          output: /tmp/${{ needs.setup.outputs.project-name }}-sarif
      - name: Save vulnerability summary
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/${{ needs.setup.outputs.project-name }}-sarif
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.setup.outputs.project-name }}-sarif
          path: /tmp/${{ needs.setup.outputs.project-name }}-sarif
          if-no-files-found: error
          retention-days: 1