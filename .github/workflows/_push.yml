name: Build application and create docker-container
on:
  workflow_call:
    inputs:
      IMAGE_NAME:
        description: 'Name docker container'
        type: string
        required: true
      IMAGE_REGISTRY:
        description: 'Docker container registry'
        type: string
        required: true


      platforms:
        description: 'Platform to build'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64,darwin/amd64,darwin/arm64'
      expired:
        description: 'Artefact is expired'
        type: boolean
        required: false
        default: false
      expire_duration:
        description: 'Duration time for expired artefact'
        type: string
        required: false
        default: '14d'
      version:
        description: 'Build version'
        type: string
        required: false
        default: build-${{ github.run_id }} 
      oci_registry_url:
        description: 'URL for OCI registry'
        type: string
        required: false
        default: 'quay.io'
    outputs: {}
    secrets:
      OCI_REGISTRY_USERNAME:
        description: 'Username for OCI registry'
        required: true
      OCI_REGISTRY_PASSWORD:
        description: 'Password for OCI registry'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  push:
    runs-on: ubuntu-latest
    needs:
      - prerequisites
      - build-docker-container
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Download cache
        uses: actions/download-artifact@v8
        with:
          path: /tmp/${{ needs.prerequisites.outputs.repository_name }}-cache
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ inputs.oci_registry_url }}/${{ needs.prerequisites.outputs.organization }}/${{ needs.prerequisites.outputs.repository_name }}
          tags: |
            ${{ inputs.version }}
      - name: Login to QUAY.IO
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.oci_registry_url }}
          username: ${{ secrets.OCI_REGISTRY_USERNAME }}
          password: ${{ secrets.OCI_REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/${{ needs.prerequisites.outputs.repository_name }}-cache-${{ github.run_id }}
          cache-to: type=gha,mode=max