name: Build application and create docker-container
on:
  workflow_call:
    inputs: {}
    outputs: {}
    secrets:
      OCI_REGISTRY_USERNAME:
        description: 'Username for OCI registry'
        required: false
      OCI_REGISTRY_PASSWORD:
        description: 'Password for OCI registry'
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump github context (pretty)
        run: |
          echo '${{ toJson(github) }}' | jq .

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - darwin/amd64
          - darwin/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set cache name
        id: cache-name
        run: |
          echo "cache-name=${{ github.event.repository.name }}-cache-${{ matrix.platform }}-${{ github.run_id }}" | sed 's:/:-:g' >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ github.event.repository.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=local,dest=/tmp/${{ github.event.repository.name }}-cache-${{ github.run_id }},mode=max
      - name: Upload cache
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.cache-name.outputs.cache-name }}
          path: /tmp/${{ github.event.repository.name }}-cache-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Download cache
        uses: actions/download-artifact@v8
        with:
          path: /tmp/${{ github.event.repository.name }}-cache
      - name: Set docker tag
        id: set_tag
        run: |
          if [[ "${{ needs.build-release-docker-image.result }}" == "success" ]]; then
            echo "TAG=type=semver,pattern={{version}},value=${{ needs.release.outputs.release_tag_name }}" >> $GITHUB_ENV
          else
            echo "TAG=type=sha,enable=true,priority=100,prefix=sha-,suffix=,format=short" >> $GITHUB_ENV
          fi
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            quay.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            ${{ env.TAG }}
      - name: Login to QUAY.IO
        uses: docker/login-action@v2
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: |
            linux/amd64
            linux/arm64
            darwin/amd64
            darwin/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=gha,mode=max