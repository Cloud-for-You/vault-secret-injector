name: Build application and create docker-container
on:
  workflow_call:
    inputs:
      platforms:
        description: 'Platform to build'
        type: string
        required: false
        #default: 'linux/amd64,linux/arm64,darwin/amd64,darwin/arm64'
        default: 'linux/amd64'
      expired:
        description: 'Artefact is expired'
        type: boolean
        required: false
        default: false
      expire_duration:
        description: 'Duration time for expired artefact'
        type: string
        required: false
        default: '14d'
      version:
        description: 'Build version'
        type: string
        required: false
        default: build-${{ github.run_id }} 
      oci_registry_url:
        description: 'URL for OCI registry'
        type: string
        required: false
        default: 'quay.io'
    outputs: {}
    secrets:
      OCI_REGISTRY_USERNAME:
        description: 'Username for OCI registry'
        required: true
      OCI_REGISTRY_PASSWORD:
        description: 'Password for OCI registry'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump github context (pretty)
        run: |
          echo '${{ toJson(github) }}' | jq .

  prerequisites:
    runs-on: ubuntu-latest
    outputs:
      organization: ${{ steps.set-vars.outputs.organization }}
      repository_name: ${{ steps.set-vars.outputs.repository_name }}
    steps:
      - name: Set new variables
        id: set-vars
        run: |
          echo "organization=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repository_name=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  build-docker-container:
    runs-on: ubuntu-latest
    needs:
      - prerequisites 
    strategy:
      matrix:
        platform: ${{ split(inputs.platforms, ',') }}
#          - linux/amd64
#          - linux/arm64
#          - darwin/amd64
#          - darwin/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set cache name
        id: cache-name
        run: |
          echo "cache-name=${{ needs.prerequisites.outputs.repository_name }}-cache-${{ matrix.platform }}-${{ github.run_id }}" | sed 's:/:-:g' >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ needs.prerequisites.outputs.repository_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=local,dest=/tmp/${{ needs.prerequisites.outputs.repository_name }}-cache-${{ github.run_id }},mode=max
      - name: Upload cache
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.cache-name.outputs.cache-name }}
          path: /tmp/${{ needs.prerequisites.outputs.repository_name }}-cache-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs:
      - prerequisites
      - build-docker-container
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Download cache
        uses: actions/download-artifact@v8
        with:
          path: /tmp/${{ needs.prerequisites.outputs.repository_name }}-cache
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ inputs.oci_registry_url }}/${{ needs.prerequisites.outputs.organization }}/${{ needs.prerequisites.outputs.repository_name }}
          tags: |
            ${{ inputs.version }}
      - name: Login to QUAY.IO
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.oci_registry_url }}
          username: ${{ secrets.OCI_REGISTRY_USERNAME }}
          password: ${{ secrets.OCI_REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ inputs.platforms }}
#          platforms: |
#            linux/amd64
#            linux/arm64
#            darwin/amd64
#            darwin/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/${{ needs.prerequisites.outputs.repository_name }}-cache-${{ github.run_id }}
          cache-to: type=gha,mode=max