name: Build application and create docker-container
on:
  workflow_call:
    inputs:
      VERSION:
        description: 'Build version'
        type: string
        required: false
        default: build-${{ github.run_id }} 
      OCI_REGISTRY_URL:
        description: 'URL for OCI registry'
        type: string
        required: false
        default: 'quay.io'
    outputs: {}
    secrets:
      OCI_REGISTRY_USERNAME:
        description: 'Username for OCI registry'
        required: true
      OCI_REGISTRY_PASSWORD:
        description: 'Password for OCI registry'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump github context (pretty)
        run: |
          echo '${{ toJson(github) }}' | jq .

  prerequisites:
    runs-on: ubuntu-latest
    outputs:
      organization: ${{ steps.set-vars.outputs.organization }}
      repository_name: ${{ steps.set-vars.outputs.repository_name }}
      extra_labels: ${{ steps.labels.outputs.extra_labels }}
    steps:
      - name: Set new variables
        id: set-vars
        run: |
          echo "organization=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repository_name=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Check if VERSION is semver
        id: semver
        run: |
          if [[ "${{ inputs.VERSION }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "is_semver=true" >> $GITHUB_OUTPUT
          else
            echo "is_semver=false" >> $GITHUB_OUTPUT
          fi
      - name: Prepare labels
        id: labels
        run: |
          if [[ "${{ steps.semver.outputs.is_semver }}" == "true" ]]; then
            echo "extra_labels=" >> $GITHUB_OUTPUT
          else
            echo "extra_labels=quay.expires-after=183d" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs:
      - prerequisites 
    strategy:
      matrix:
        platform:
          - linux/amd64
#          - linux/arm64
#          - darwin/amd64
#          - darwin/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set cache name
        id: cache-name
        run: |
          echo "cache-name=${{ needs.prerequisites.outputs.repository_name }}-cache-${{ matrix.platform }}-${{ github.run_id }}" | sed 's:/:-:g' >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ needs.prerequisites.outputs.repository_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=local,dest=/tmp/${{ needs.prerequisites.outputs.repository_name }}-cache-${{ github.run_id }},mode=max
      - name: Upload cache
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.cache-name.outputs.cache-name }}
          path: /tmp/${{ needs.prerequisites.outputs.repository_name }}-cache-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs:
      - prerequisites
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Download cache
        uses: actions/download-artifact@v8
        with:
          path: /tmp/${{ needs.prerequisites.outputs.repository_name }}-cache
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ inputs.OCI_REGISTRY_URL }}/${{ needs.prerequisites.outputs.organization }}/${{ needs.prerequisites.outputs.repository_name }}
          tags: |
            ${{ inputs.VERSION }}
          labels: |
             ${{ needs.prerequisites.outputs.extra_labels }}
      - name: Login to QUAY.IO
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.OCI_REGISTRY_URL }}
          username: ${{ secrets.OCI_REGISTRY_USERNAME }}
          password: ${{ secrets.OCI_REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: |
            linux/amd64
            linux/arm64
            darwin/amd64
            darwin/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=gha,mode=max