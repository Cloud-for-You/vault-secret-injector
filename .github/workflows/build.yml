name: Build application and create docker-container
on:
  workflow_call:
    inputs: {}
    outputs: {}
    secrets:
      OCI_REGISTRY_USERNAME:
        description: 'Username for OCI registry'
        required: false
      OCI_REGISTRY_PASSWORD:
        description: 'Password for OCI registry'
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build-docker-container:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - darwin/amd64
          - darwin/arm64
    steps:
      - name: DEBUG
        run: echo ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set cache name
        id: cache-name
        run: |
          echo "cache-name=${{ github.event.repository.name }}-cache-${{ matrix.platform }}-${{ github.run_id }}" | sed 's:/:-:g' >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ github.event.repository.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=local,dest=/tmp/${{ github.event.repository.name }}-cache-${{ github.run_id }},mode=max
      - name: Upload cache
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.cache-name.outputs.cache-name }}
          path: /tmp/${{ github.event.repository.name }}-cache-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 1